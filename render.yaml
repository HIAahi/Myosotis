# render.yaml  —  deploy both services from one repo
# Commit this file to your repo root. Render auto-detects it.

services:
  # ── FastAPI Backend ────────────────────────────────────────────────────────
  - type: web
    name: ads-parser-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # Set this manually in Render dashboard → secret
      - key: PYTHON_VERSION
        value: "3.11.0"
    healthCheckPath: /api/health
    autoDeploy: true

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  - type: web
    name: ads-parser-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20.11.0"
      - key: NEXT_PUBLIC_API_URL
        # After deploying the backend, paste its Render URL here:
        value: https://ads-parser-api.onrender.com
    autoDeploy: true
